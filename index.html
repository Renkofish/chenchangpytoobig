let artists = Object.keys(artistDatabase); let drawnArtists = []; let audioCtx = null; let isSoundEnabled = true;

function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }

function playSound(type) { if (!isSoundEnabled) return; try { const ctx = getAudioCtx(); const o = ctx.createOscillator(); const g = ctx.createGain(); if (type === 'tick') { o.type = 'sine'; o.frequency.setValueAtTime(440, ctx.currentTime); g.gain.setValueAtTime(0.05, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.1); } else if (type === 'win') { [523.25, 659.25, 783.99].forEach((f, i) => { const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); o2.type = 'triangle'; o2.frequency.setValueAtTime(f, ctx.currentTime + i * 0.1); g2.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.1); g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.3); o2.connect(g2); g2.connect(ctx.destination); o2.start(ctx.currentTime + i * 0.1); o2.stop(ctx.currentTime + i * 0.1 + 0.3); }); } } catch(e) {} }

function toggleSound() { isSoundEnabled = !isSoundEnabled; document.getElementById('soundIcon').innerText = isSoundEnabled ? '🔊' : '🔇'; }

function renderArtistList() { const container = document.getElementById('artistList'); document.getElementById('count').innerText = artists.length; container.innerHTML = [...artists].sort().map(name => ` <div class="artist-tag-pill font-bold text-slate-700"> <span>${name}</span> <button onclick="removeArtist('${name}')" class="ml-3 bg-red-50 text-red-600 w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-100 transition shadow-sm">&times;</button> </div> `).join(''); } function addArtist() { const name = document.getElementById('newArtist').value.trim(); if (name && !artists.includes(name)) { artists.push(name); document.getElementById('newArtist').value = ''; renderArtistList(); } } function removeArtist(name) { artists = artists.filter(a => a !== name); renderArtistList(); }

function startDraw() { const remaining = artists.filter(a => !drawnArtists.includes(a)); if (remaining.length === 0) return alert("全部都抽完了！"); const btn = document.getElementById('drawBtn'); const display = document.getElementById('drawDisplay'); btn.disabled = true; display.classList.add('animate-roll'); getAudioCtx(); let counter = 0; const interval = setInterval(() => { display.innerText = remaining[Math.floor(Math.random() * remaining.length)]; playSound('tick'); if (++counter > 15) { clearInterval(interval); const winner = remaining[Math.floor(Math.random() * remaining.length)]; display.innerText = winner; display.classList.remove('animate-roll'); drawnArtists.push(winner); updateHistory(); btn.disabled = false; setTimeout(() => showArtistDetail(winner), 200); } }, 100); }

function showArtistDetail(name) { const modal = document.getElementById('artistModal'); document.getElementById('modalTitle').innerText = name; const data = artistDatabase[name] || { facts: ["深受大眾喜愛的巨星。"], icon: "🌟" }; document.getElementById('modalIcon').innerText = data.icon; document.getElementById('modalFacts').innerHTML = data.facts.map(f => `<li class="flex items-start text-left"><span class="text-slate-400 mr-3">✦</span>${f}</li>`).join(''); const img = document.getElementById('modalImg'); if (data.img) { img.src = data.img; document.getElementById('imgLoader').style.display = 'flex'; img.onload = () => document.getElementById('imgLoader').style.display = 'none'; document.getElementById('viewPhotoBtn').classList.remove('hidden'); } else { document.getElementById('viewPhotoBtn').classList.add('hidden'); } document.getElementById('modalContentFacts').classList.remove('hidden'); document.getElementById('modalContentPhoto').classList.add('hidden'); document.getElementById('backToFactsBtn').classList.add('hidden'); modal.classList.remove('hidden'); playSound('win'); }

function togglePhotoView() { document.getElementById('modalContentFacts').classList.toggle('hidden'); document.getElementById('modalContentPhoto').classList.toggle('hidden'); document.getElementById('viewPhotoBtn').classList.toggle('hidden'); document.getElementById('backToFactsBtn').classList.toggle('hidden'); }

function closeModal() { document.getElementById('artistModal').classList.add('hidden'); } function resetDraw() { if(confirm("確定要重置抽籤紀錄嗎？")) { drawnArtists = []; document.getElementById('drawDisplay').innerText = "準備開始"; updateHistory(); } } function updateHistory() { document.getElementById('historyList').innerHTML = [...drawnArtists].reverse().map(n => `<span class="bg-slate-100 px-3 py-1 rounded-full font-bold text-slate-400 border border-slate-200">${n}</span>`).join(''); }

function generateCards() { if (artists.length < 16) return alert("名單不足 16 位，無法生成賓果卡！"); const count = parseInt(document.getElementById('cardCount').value); const area = document.getElementById('printArea'); area.innerHTML = ''; for (let i = 0; i < count; i++) { const card = document.createElement('div'); card.className = 'bingo-card'; const pool = [...artists].sort(() => Math.random() - 0.5).slice(0, 16); card.innerHTML = ` <div class="text-center mb-6"> <h1 class="text-4xl md:text-6xl font-black mb-2 tracking-tighter text-slate-800">經典藝人賓果</h1> <p class="text-xl md:text-2xl text-slate-500 font-bold italic mb-1">重溫黃金年代 ‧ 祝您幸運連線</p> <p class="text-sm md:text-base text-slate-400 font-bold leading-relaxed"> 簡單賓果規則：抽數個籤後，連線最多條者即可獲勝 </p> </div> <div class="bingo-grid">${pool.map(n => `<div class="bingo-cell" onclick="this.classList.toggle('marked')">${n}</div>`).join('')}</div> <div class="mt-8 flex justify-between items-end border-t-4 border-slate-100 pt-6"> <div> <div class="text-lg font-black text-slate-300 italic uppercase mb-1">CARD #${(i+1).toString().padStart(3,'0')}</div> <div class="text-sm font-bold text-slate-300">活動設計者：鍾孟修 職能治療師</div> </div> <div class="text-2xl md:text-3xl font-black text-slate-800">姓名：_________________</div> </div> `; area.appendChild(card); } window.scrollTo({ top: area.offsetTop - 20, behavior: 'smooth' }); }

async function downloadPDF() { const originalCards = document.querySelectorAll('.bingo-card'); if (originalCards.length === 0) return alert("請先生成預覽！");

const overlay = document.getElementById('loadingOverlay'); const progressText = document.getElementById('progressText'); const cloneContainer = document.getElementById('download-clone-box'); overlay.classList.remove('hidden'); cloneContainer.innerHTML = '';

const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4'); const pdfWidth = 210; const pdfHeight = 297;

try { for (let i = 0; i < originalCards.length; i++) { progressText.innerText = `正在製作第 ${i+1} 頁 (處理中...)`; const clone = originalCards[i].cloneNode(true); clone.classList.add('download-standard'); cloneContainer.appendChild(clone);

const canvas = await html2canvas(clone, { scale: 2.5, useCORS: true, backgroundColor: "#ffffff", width: 794, height: 1123, logging: false });

const imgData = canvas.toDataURL('image/jpeg', 0.9); if (i > 0) pdf.addPage(); pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight); cloneContainer.innerHTML = ''; } pdf.save(`經典藝人賓果_${originalCards.length}張.pdf`); } catch (error) { console.error(error); alert("PDF 下載失敗，請檢查網路連線。"); } finally { overlay.classList.add('hidden'); cloneContainer.innerHTML = ''; } }

window.onload = () => { renderArtistList(); document.getElementById('newArtist').onkeypress = (e) => e.key === 'Enter' && addArtist(); }; </script></body></html>
